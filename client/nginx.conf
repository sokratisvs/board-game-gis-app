server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Honor an upstream TLS terminator's header (e.g. production reverse proxy).
        # For direct HTTP access (staging, same-VM) no header is present and express
        # falls back to the raw connection protocol (http), so cookies are not Secure.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Cookie $http_cookie;

        # allow POST/PUT/etc
        proxy_redirect off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA catch-all: serves index.html for all client-side routes.
    # no-cache is set here because this block is what handles GET /, GET /users,
    # GET /exploration/routes etc. — all of which nginx serves as index.html via
    # try_files. Without it the browser caches the old index.html and keeps loading
    # stale content-hashed JS even after a new deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
